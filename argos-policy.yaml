# Argos routing policy (capability-first, two-level).
# Backend selection = a capability/feasibility decision (Forge vs spine).
# Route selection   = an optimisation decision within the chosen backend.
# This file is DATA. The evaluation logic lives in route_select.py; this holds
# the predicates' wiring, the task-class map, and the scoring weights.
#
# NAMING: the not-Forge backend is the langgraph-spine (UM780:3014) fronting
# LiteLLM. Lineage: orchestrator -> Janus -> Pharos -> RETIRED (LGSPINE-003/004).
# Route identities use spine/litellm; "janus" is accepted on input as a
# deprecated alias only.
#
# Reset to defaults: cp argos-policy.defaults.yaml argos-policy.yaml
# The loader validates this on read and falls back to defaults if malformed.
version: 1

# ---------------------------------------------------------------------------
# BACKEND GATE (capability-first). Precedence: explicit override -> hard Forge
# predicates -> hard spine predicates -> ambiguous default. Forge triggers on
# NECESSITY (hands on the keyboard); spine is the safe default (brain + mouth).
# ---------------------------------------------------------------------------
backend_gate:
  ambiguous_default: spine      # safest failure for a single-user system
  # Any of these task properties being true forces Forge (execution authority).
  forge_predicates:
    - needs_file_write          # create/edit/delete files
    - needs_command_exec        # run shell/tests/builds/migrations
    - needs_tool_loop           # iterate act->observe->act
    - needs_local_state         # inspect repo/logs/env/filesystem
    - acceptance_requires_execution   # success only verifiable by running something
  # spine is sufficient only if ALL of these hold (and no Forge predicate fired).
  spine_predicates_all:
    - text_only_output
    - single_turn_sufficient
  # Lexical inference (fallback ONLY when caller did not set predicates).
  # These are heuristics; every inferred decision is logged so we can see misroutes.
  lexical_forge_verbs: [apply, edit, run, fix, patch, save, commit, deploy, migrate, install, build, test, refactor, rename, delete]
  lexical_spine_verbs: [explain, compare, plan, draft, brainstorm, summarise, summarize, describe, suggest, review, critique, what, why, how]

# ---------------------------------------------------------------------------
# TASK-CLASS -> BACKEND HINT. Reuses the existing Astrolabe / 24-class taxonomy.
# This is a HINT layer feeding the predicates, not a hard override: a class can
# still be pushed the other way by an explicit caller predicate. "capable" means
# the class typically needs execution; "sufficient" means text usually suffices.
# ---------------------------------------------------------------------------
task_class_backend:
  # execution-leaning (Forge)
  code_generation: forge
  code_implementation: forge
  code_boilerplate: forge
  code_algorithmic: forge
  debugging: forge
  debugging_simple: forge
  debugging_intermittent: forge
  refactoring: forge
  testing: forge
  test_unit: forge
  test_integration: forge
  data_engineering: forge
  devops: forge
  # Astrolabe verbs that imply execution
  ssh-fix: forge
  ssh-diagnose: forge
  file-edit-single: forge
  file-edit-multi: forge
  code-write-new: forge
  code-debug: forge
  multi-machine-orchestrate: forge
  vault-bulk-edit: forge
  # cognition-leaning (spine)
  documentation: spine
  docs_api: spine
  docs_explainer: spine
  architecture_design: spine
  analysis: spine
  formatting: spine
  extraction: spine
  creative: spine
  classification: spine
  conversation: spine
  security: spine           # advisory unless it also needs to touch the system
  info-gather: spine
  web-research: spine
  schema-design: spine
  brief-meta: spine

# ---------------------------------------------------------------------------
# ROUTE SCORING (within the chosen backend). Weights are SEEDS to tune against
# real outcomes, not evidence. Filters run before scoring (unhealthy / wrong
# backend / quota-blocked / capability-insufficient removed first).
# ---------------------------------------------------------------------------
scoring:
  # Forge cares more about reliability+quota (failed loops are costly).
  forge_weights:
    health: 0.35
    quota: 0.20
    quality: 0.20
    cost: 0.15
    latency: 0.05
    path_preference: 0.05
  # spine cares more about cost+latency (text replies, interchangeable in band).
  spine_weights:
    health: 0.25
    quota: 0.10
    quality: 0.20
    cost: 0.25
    latency: 0.15
    path_preference: 0.05
  # path_preference: nudge toward zero-marginal flat-rate-capped healthy routes.
  # This captures the dual-homed free-path economics WITHOUT breaking the
  # capability-first hierarchy. Promote to a hard rule later if desired.
  path_preference_bonus:
    flat_rate_capped: 1.0     # full bonus (OpenCode Go, ~$0 marginal within cap)
    sunk: 0.8                 # OAuth CLIs, also ~$0 marginal
    per_token: 0.0            # no bonus

# Quality floors per error-sensitivity (used by the floor gate, unchanged).
quality_floors:
  low: 0.65
  medium: 0.70
  high: 0.85
  critical: 0.90

# ---------------------------------------------------------------------------
# DUAL-GATE (CHG-P9-052). The route gate has TWO predicates:
#   clears_accept  = predicted_success >= task_classes.default_quality_floor
#                    (the floor is now read on the ACCEPT-RATE scale; recalibrated
#                    by the CHG-P9-052 floor migration -- e.g. devops 0.90 -> 0.80).
#   clears_quality = (gate_mode == basic) OR benchmark_quality(model,class) >= q_min
# clears = clears_accept AND clears_quality. accept_floor is IDENTICAL in both
# modes; switching mode toggles ONLY whether clears_quality is applied. Never tune
# accept_floor to compensate for strict. The gate produces the ELIGIBLE set; the
# cost scorer above picks among whatever clears -- q_min is NOT in the cost weights.
#
# Env ARGOS_GATE_MODE (basic|strict) overrides gate_mode without editing this file.
# Default strict: `accepted` currently only means "completed without error", so the
# quality screen is load-bearing (catches completed-but-sloppy) until the agentic
# vetter writes real quality labels; until then strict screens on bench_cache.
gate_mode: strict        # "basic" | "strict"

# q_min: LOOSE benchmark-quality screen (benchmark-SCORE scale, NOT accept-rate),
# applied ONLY in strict mode. Looked up by class_id first, then error-sensitivity.
# Screens out only genuinely-bad models (e.g. analysis mimo-v2.5 ~0.50, devops
# nemotron ~0.68); it MUST NOT block the strong 0.85+ cluster. A model with NO
# benchmark for its class is NOT blocked here (clears_quality treated TRUE) -- the
# accept gate still governs cold-start models.
q_min:
  low: 0.55
  medium: 0.60
  high: 0.70
  critical: 0.75
